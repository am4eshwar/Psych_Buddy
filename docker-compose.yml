# Docker Compose for local development infrastructure
# Usage: docker compose up -d

services:
  # ── PostgreSQL (Task & schedule persistence) ───────────────
  postgres:
    image: postgres:16-alpine
    container_name: psych-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psych_agent
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Redis (Short-term session context) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: psych-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ── Qdrant (Vector store for Mem0) ─────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: psych-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrantdata:/qdrant/storage

  # ── Psych Buddy Bot ──────────────────────────────────────────
  bot:
    build: .
    container_name: psych-bot
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - qdrant
    env_file:
      - .env
    environment:
      # Override local URLs to point to the docker-compose services
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/psych_agent
      - POSTGRES_SYNC_URL=postgresql://postgres:postgres@postgres:5432/psych_agent
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      
volumes:
  pgdata:
  redisdata:
  qdrantdata:
